# Builds, signs, notarizes, and publishes a new Adnine release.
#
# Trigger: push a version tag from the private source repo, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Required secrets (set in this repo's Settings → Secrets):
#   APPLE_CERTIFICATE_BASE64 - Developer ID Application cert exported as .p12, base64-encoded
#   APPLE_CERTIFICATE_PASSWORD - password used when exporting the .p12
#   APPLE_SIGNING_IDENTITY  - "Developer ID Application: Name (TEAM_ID)"
#   APPLE_ID                - Apple ID email
#   APPLE_PASSWORD          - App-specific password (not your account password)
#   APPLE_TEAM_ID           - 10-character team identifier
#   TAURI_SIGNING_PRIVATE_KEY          - contents of ~/.tauri/adnine.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD - password for the signing key (or empty)
#
# Required secrets (continued):
#   SOURCE_REPO_SSH_KEY     - deploy key (private key) with read access to rylanowens/chord

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
        type: string
  repository_dispatch:
    types: [release-trigger]

permissions:
  contents: write

env:
  APP_NAME: Adnine

jobs:
  build-and-release:
    runs-on: macos-latest
    environment: Adnine Releases Prod
    steps:
      - name: Resolve version
        id: resolve
        run: |
          VERSION="${{ inputs.version || github.event.client_payload.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::No version provided (neither workflow_dispatch input nor repository_dispatch payload)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version input
        run: |
          if [[ ! "${{ steps.resolve.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be semver (e.g. 0.1.0), got: ${{ steps.resolve.outputs.version }}"
            exit 1
          fi

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: rylanowens/chord
          ssh-key: ${{ secrets.SOURCE_REPO_SSH_KEY }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build universal binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Gather release artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"

          DMG=$(ls "${BUNDLE_DIR}/dmg/"*.dmg)
          ALIAS="${BUNDLE_DIR}/dmg/Adnine_universal.dmg"
          cp "$DMG" "$ALIAS"
          TARGZ=$(ls "${BUNDLE_DIR}/macos/"*.tar.gz | grep -v '\.sig$')
          SIG=$(ls "${BUNDLE_DIR}/macos/"*.tar.gz.sig)
          LATEST="${BUNDLE_DIR}/macos/latest.json"

          # Generate latest.json for the Tauri updater
          SIGNATURE=$(cat "$SIG")
          TARGZ_FILENAME=$(basename "$TARGZ")
          DOWNLOAD_URL="https://github.com/rylanowens/adnine-releases/releases/download/v${VERSION}/${TARGZ_FILENAME}"
          jq -n \
            --arg version "$VERSION" \
            --arg notes "Adnine $VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-universal": { signature: $sig, url: $url },
                "darwin-aarch64": { signature: $sig, url: $url },
                "darwin-x86_64": { signature: $sig, url: $url }
              }
            }' > "$LATEST"

          echo "dmg=${DMG}" >> "$GITHUB_OUTPUT"
          echo "alias=${ALIAS}" >> "$GITHUB_OUTPUT"
          echo "targz=${TARGZ}" >> "$GITHUB_OUTPUT"
          echo "sig=${SIG}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # Verify all artifacts exist
          for f in "$DMG" "$ALIAS" "$TARGZ" "$SIG" "$LATEST"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing artifact: $f"
              exit 1
            fi
            echo "Found: $f ($(du -h "$f" | cut -f1))"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.resolve.outputs.version }}
          name: Adnine ${{ steps.resolve.outputs.version }}
          draft: false
          generate_release_notes: true
          body: |
            ## Adnine ${{ steps.resolve.outputs.version }}

            ### Download

            **[Adnine_${{ steps.resolve.outputs.version }}_universal.dmg](https://github.com/rylanowens/adnine-releases/releases/download/v${{ steps.resolve.outputs.version }}/Adnine_${{ steps.resolve.outputs.version }}_universal.dmg)** — macOS 11+, Intel & Apple Silicon

            ### What's New

            -

            ### Installation

            1. Open the DMG and drag Adnine to Applications
            2. Launch from Applications

            > First launch: if macOS blocks the app, right-click → Open → click "Open" in the dialog.
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.alias }}
            ${{ steps.artifacts.outputs.targz }}
            ${{ steps.artifacts.outputs.sig }}
            ${{ steps.artifacts.outputs.latest }}
